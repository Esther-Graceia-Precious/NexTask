version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextask-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - NODE_ENV=production
    networks:
      - nextask-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextask-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nextask-network

networks:
  nextask-network:
    driver: bridge
