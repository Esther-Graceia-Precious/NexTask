name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 - Build and push backend image
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nextask-backend:latest

      # Step 4 - Build and push frontend image
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nextask-frontend:latest
          build-args: |
            VITE_API_URL=https://nextask-api-93s7.onrender.com

      # Step 5 - Trigger Render backend redeploy
      - name: Deploy backend to Render
        run: |
          curl -X POST ${{ secrets.RENDER_BACKEND_HOOK }}

      # Step 6 - Trigger Render frontend redeploy
      - name: Deploy frontend to Render
        run: |
          curl -X POST ${{ secrets.RENDER_FRONTEND_HOOK }}